<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>States United</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif+Caption&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #051C40;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      padding: 0 42px;
      height: 84px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(247, 247, 240, 0.18);
      position: relative;
    }

    .logo {
      height: 54px;
      width: auto;
      display: block;
    }

    /* ── Centered title with inline dropdown ── */
    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'PT Serif Caption', serif;
      font-size: 24px;
      font-weight: 700;
      color: #f7f7f0;
      white-space: nowrap;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .title-static {
      margin-right: 0.25em;
    }

    .title-dropdown-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .title-trigger {
      font-family: 'PT Serif Caption', serif;
      font-size: 24px;
      font-weight: 700;
      color: #f7f7f0;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1.5px;
      letter-spacing: 0.01em;
    }

    .title-trigger svg {
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .title-trigger.open svg {
      transform: rotate(180deg);
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%);
      background-color: #051C40;
      border: 1px solid rgba(247, 247, 240, 0.18);
      border-radius: 4px;
      min-width: 220px;
      max-height: 340px;
      overflow-y: auto;
      z-index: 100;
    }

    .dropdown-menu.open {
      display: block;
    }

    .dropdown-menu::-webkit-scrollbar {
      width: 4px;
    }

    .dropdown-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    .dropdown-menu::-webkit-scrollbar-thumb {
      background: rgba(247, 247, 240, 0.25);
      border-radius: 2px;
    }

    .dropdown-menu li {
      list-style: none;
      font-family: 'PT Serif Caption', serif;
      font-size: 21px;
      color: #f7f7f0;
      padding: 10px 16px;
      cursor: pointer;
      transition: background-color 0.1s ease;
      text-align: center;
    }

    .dropdown-menu li:hover {
      background-color: rgba(247, 247, 240, 0.08);
    }

    .dropdown-menu li.active {
      background-color: rgba(247, 247, 240, 0.12);
    }

    /* ── Map area ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #map {
      display: grid;
      grid-template-columns: repeat(11, 68px);
      grid-template-rows: repeat(8, 68px);
      gap: 7px;
    }

    .tile {
      width: 68px;
      height: 68px;
      background-color: #f7f7f0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'PT Serif Caption', serif;
      font-size: 14px;
      font-weight: 700;
      color: #051C40;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.15s ease;
      letter-spacing: 0.03em;
      user-select: none;
      text-transform: uppercase;
    }

    .tile:hover {
      background-color: #ffffff;
      transform: scale(1.105);
      z-index: 1;
      position: relative;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" alt="Logo" class="logo">

    <div class="header-title">
      <span class="title-static">Election Safeguards in</span>
      <div class="title-dropdown-wrapper">
        <button class="title-trigger" id="statesBtn" aria-haspopup="listbox" aria-expanded="false">
          <span id="selectedLabel">America</span>
          <svg width="13" height="8" viewBox="0 0 13 8" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 1L6.5 7L12 1" stroke="#f7f7f0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul class="dropdown-menu" id="statesMenu" role="listbox"></ul>
      </div>
    </div>
  </header>

  <main>
    <div id="map"></div>
  </main>

  <script>
    const stateData = [
      { abbr: 'AK', name: 'Alaska',           row: 0, col: 0 },
      { abbr: 'ME', name: 'Maine',             row: 0, col: 10 },
      { abbr: 'WI', name: 'Wisconsin',         row: 1, col: 5 },
      { abbr: 'VT', name: 'Vermont',           row: 1, col: 9 },
      { abbr: 'NH', name: 'New Hampshire',     row: 1, col: 10 },
      { abbr: 'WA', name: 'Washington',        row: 2, col: 0 },
      { abbr: 'ID', name: 'Idaho',             row: 2, col: 1 },
      { abbr: 'MT', name: 'Montana',           row: 2, col: 2 },
      { abbr: 'ND', name: 'North Dakota',      row: 2, col: 3 },
      { abbr: 'MN', name: 'Minnesota',         row: 2, col: 4 },
      { abbr: 'IL', name: 'Illinois',          row: 2, col: 5 },
      { abbr: 'MI', name: 'Michigan',          row: 2, col: 6 },
      { abbr: 'NY', name: 'New York',          row: 2, col: 8 },
      { abbr: 'MA', name: 'Massachusetts',     row: 2, col: 9 },
      { abbr: 'OR', name: 'Oregon',            row: 3, col: 0 },
      { abbr: 'NV', name: 'Nevada',            row: 3, col: 1 },
      { abbr: 'WY', name: 'Wyoming',           row: 3, col: 2 },
      { abbr: 'SD', name: 'South Dakota',      row: 3, col: 3 },
      { abbr: 'IA', name: 'Iowa',              row: 3, col: 4 },
      { abbr: 'IN', name: 'Indiana',           row: 3, col: 5 },
      { abbr: 'OH', name: 'Ohio',              row: 3, col: 6 },
      { abbr: 'PA', name: 'Pennsylvania',      row: 3, col: 7 },
      { abbr: 'NJ', name: 'New Jersey',        row: 3, col: 8 },
      { abbr: 'CT', name: 'Connecticut',       row: 3, col: 9 },
      { abbr: 'RI', name: 'Rhode Island',      row: 3, col: 10 },
      { abbr: 'CA', name: 'California',        row: 4, col: 0 },
      { abbr: 'UT', name: 'Utah',              row: 4, col: 1 },
      { abbr: 'CO', name: 'Colorado',          row: 4, col: 2 },
      { abbr: 'NE', name: 'Nebraska',          row: 4, col: 3 },
      { abbr: 'MO', name: 'Missouri',          row: 4, col: 4 },
      { abbr: 'KY', name: 'Kentucky',          row: 4, col: 5 },
      { abbr: 'WV', name: 'West Virginia',     row: 4, col: 6 },
      { abbr: 'VA', name: 'Virginia',          row: 4, col: 7 },
      { abbr: 'MD', name: 'Maryland',          row: 4, col: 8 },
      { abbr: 'DE', name: 'Delaware',          row: 4, col: 9 },
      { abbr: 'AZ', name: 'Arizona',           row: 5, col: 1 },
      { abbr: 'NM', name: 'New Mexico',        row: 5, col: 2 },
      { abbr: 'KS', name: 'Kansas',            row: 5, col: 3 },
      { abbr: 'AR', name: 'Arkansas',          row: 5, col: 4 },
      { abbr: 'TN', name: 'Tennessee',         row: 5, col: 5 },
      { abbr: 'NC', name: 'North Carolina',    row: 5, col: 6 },
      { abbr: 'SC', name: 'South Carolina',    row: 5, col: 7 },
      { abbr: 'DC', name: 'Washington D.C.',   row: 5, col: 8 },
      { abbr: 'OK', name: 'Oklahoma',          row: 6, col: 3 },
      { abbr: 'LA', name: 'Louisiana',         row: 6, col: 4 },
      { abbr: 'MS', name: 'Mississippi',       row: 6, col: 5 },
      { abbr: 'AL', name: 'Alabama',           row: 6, col: 6 },
      { abbr: 'GA', name: 'Georgia',           row: 6, col: 7 },
      { abbr: 'HI', name: 'Hawaii',            row: 7, col: 0 },
      { abbr: 'TX', name: 'Texas',             row: 7, col: 3 },
      { abbr: 'FL', name: 'Florida',           row: 7, col: 8 },
    ];

    /* ── Build map tiles ── */
    const map = document.getElementById('map');
    stateData.forEach(({ abbr, row, col }) => {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.textContent = abbr;
      tile.style.gridColumn = col + 1;
      tile.style.gridRow = row + 1;
      map.appendChild(tile);
    });

    /* ── Build dropdown list ── */
    const menu = document.getElementById('statesMenu');
    const label = document.getElementById('selectedLabel');
    const btn = document.getElementById('statesBtn');

    const americaItem = document.createElement('li');
    americaItem.textContent = 'America';
    americaItem.setAttribute('role', 'option');
    americaItem.classList.add('active');
    americaItem.addEventListener('click', () => select('America'));
    menu.appendChild(americaItem);

    const sorted = [...stateData]
      .filter(s => s.abbr !== 'DC')
      .sort((a, b) => a.name.localeCompare(b.name));

    sorted.forEach(({ name }) => {
      const li = document.createElement('li');
      li.textContent = name;
      li.setAttribute('role', 'option');
      li.addEventListener('click', () => select(name));
      menu.appendChild(li);
    });

    function select(name) {
      label.textContent = name;
      menu.querySelectorAll('li').forEach(li => {
        li.classList.toggle('active', li.textContent === name);
      });
      closeMenu();
    }

    function closeMenu() {
      menu.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', false);
    }

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = menu.classList.toggle('open');
      btn.classList.toggle('open', isOpen);
      btn.setAttribute('aria-expanded', isOpen);
    });

    document.addEventListener('click', closeMenu);
    menu.addEventListener('click', (e) => e.stopPropagation());
  </script>
</body>
</html>
